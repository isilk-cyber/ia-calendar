<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImpactAlpha 2026 Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- EVENT DETAIL MODAL -->
<div class="detail-ov" id="detail-ov" onclick="maybeCloseDetail(event)">
  <div class="detail-md" id="detail-md">
    <div class="detail-hdr">
      <div>
        <div class="detail-title" id="detail-title"></div>
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap" id="detail-badges"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="detail-ftr">
      <div class="detail-ftr-l">
        <button class="btn-g" style="color:var(--im);border-color:var(--ru)" onclick="closeDetail()">Close</button>
        <button class="ab del" id="detail-del-btn" onclick="deleteFromDetail()">Delete</button>
      </div>
      <button class="btn-p" id="detail-edit-btn" onclick="editFromDetail()">Edit event</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="settings-mo" id="settings-mo" onclick="maybeCloseSettings(event)">
  <div class="settings-md">
    <div class="settings-hdr">
      <h3>&#9881; Settings</h3>
      <button class="mc2" onclick="closeSettings()">&times;</button>
    </div>
    <div class="settings-tabs">
      <button class="stab active" id="stab-team" onclick="switchSettingsTab('team')">Team members</button>
      <button class="stab" id="stab-topics" onclick="switchSettingsTab('topics')">Topics</button>
    </div>
    <div class="settings-body">
      <!-- TEAM TAB -->
      <div id="stab-team-body">
        <div class="settings-section">
          <h4>Team members</h4>
          <div class="item-list" id="team-list"></div>
          <div class="add-row">
            <input type="text" id="new-team-name" placeholder="Full name (e.g. Sarah Jones)" onkeydown="if(event.key==='Enter')addTeamMember()">
            <button class="add-btn" onclick="addTeamMember()">+ Add</button>
          </div>
        </div>
      </div>
      <!-- TOPICS TAB -->
      <div id="stab-topics-body" style="display:none">
        <div class="settings-section">
          <h4>Topics / categories</h4>
          <div class="item-list" id="topic-list"></div>
          <div class="add-row">
            <input type="text" id="new-topic-label" placeholder="Topic name (e.g. Housing)" onkeydown="if(event.key==='Enter')addTopic()">
            <button class="add-btn" onclick="addTopic()">+ Add</button>
          </div>
          <p style="font-size:11px;color:var(--il);margin-top:.75rem">New topics are automatically assigned a color and added to all filters and the event form.</p>
        </div>
      </div>
    </div>
    <div class="settings-ftr">
      <button class="btn-g" style="color:var(--im);border-color:var(--ru)" onclick="closeSettings()">Cancel</button>
      <button class="btn-p" onclick="saveSettings()">Save changes</button>
    </div>
  </div>
</div>

<style>
:root{--brand:#0f8afb;--brand-dark:#22272b;--brand-mid:#515e66;--brand-light:#b7dcff;--brand-pale:#e8f4ff;--gd:#22272b;--gk:#2d343a;--gm:#0f8afb;--gl:#60b3ff;--gp:#e8f4ff;--am:#BA7517;--ap:#faeeda;--bl:#0f8afb;--bp:#e8f4ff;--pp:#eeedfe;--pu:#534AB7;--cp:#fcebeb;--co:#A32D2D;--kp:#fbeaf0;--pk:#993556;--gy:#f3f5f7;--gr:#515e66;--ink:#22272b;--im:#515e66;--il:#9fadba;--if:#9fadba;--ru:#e0e4e8;--bg:#f3f5f7;--wh:#fff;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;display:flex;flex-direction:column}
.site-header{background:var(--gd);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:50px;flex-shrink:0;z-index:50}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-size:13px;font-weight:500;color:#fff}
.logo-sep{color:rgba(255,255,255,.25);margin:0 3px}
.logo-sub{font-size:11px;color:rgba(255,255,255,.45)}
.live-pill{font-size:10px;background:rgba(15,138,251,.15);color:#60b3ff;border:1px solid rgba(15,138,251,.35);border-radius:10px;padding:2px 7px;margin-left:5px;display:none}
.header-right{display:flex;align-items:center;gap:7px}
.save-st{font-size:11px;color:rgba(255,255,255,.3)}
.view-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:6px;padding:2px;gap:2px}
.vbtn{padding:4px 11px;border-radius:4px;border:none;background:transparent;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.vbtn.active{background:rgba(255,255,255,.15);color:#fff}
.btn-g{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-g:hover{background:rgba(255,255,255,.08);color:#fff}
.btn-p{background:var(--brand);color:#fff;border:none;border-radius:6px;padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-p:hover{background:#0d7de0}
/* Layout */
.app-body{display:flex;flex:1;overflow:hidden}
/* Sidebar */
.sidebar{width:182px;flex-shrink:0;background:var(--wh);border-right:1px solid var(--ru);padding:.75rem;overflow-y:auto}
.srch{width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--ru);border-radius:var(--r);background:var(--bg);color:var(--ink);font-family:inherit;outline:none;margin-bottom:.65rem}
.srch:focus{border-color:var(--brand)}
.sbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--if);margin:.8rem 0 2px;display:block}
.fb{display:flex;align-items:center;gap:6px;width:100%;padding:4px 6px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:11px;color:var(--im);text-align:left;margin-bottom:1px;transition:background .1s}
.fb:hover{background:var(--gy)}
.fb.active{background:var(--brand-pale);color:var(--brand);font-weight:500}
.fd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fc{margin-left:auto;font-size:10px;color:var(--if)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:3px}
.sb{background:var(--bg);border-radius:var(--r);padding:6px 4px;text-align:center}
.sn{font-size:16px;font-weight:500}
.sl{font-size:9px;color:var(--il);margin-top:1px}
/* Cal area */
.cal-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.25rem;border-bottom:1px solid var(--ru);background:var(--wh);flex-shrink:0}
.mnt{font-family:'Lora',serif;font-size:19px;font-weight:400;font-style:italic;color:var(--ink)}
.mns{font-family:'Noto Sans',sans-serif;font-size:11px;color:var(--if);font-style:normal;margin-left:6px}
.nav-arr{display:flex;gap:3px}
.nb{height:28px;padding:0 10px;border:1px solid var(--ru);border-radius:5px;background:var(--wh);cursor:pointer;font-size:14px;color:var(--im);display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:inherit;font-size:11px}
.nb:hover{background:var(--bg);border-color:#ccc}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--ru);background:var(--wh);flex-shrink:0}
.dow{text-align:center;padding:5px 0;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--if)}
.cal-grid-wrap{flex:1;overflow-y:auto;border-left:1px solid var(--ru)}
.cal-grid{border-left:0}
.cc{border-right:1px solid var(--ru);border-bottom:1px solid var(--ru);padding:4px 5px;min-width:0;position:relative;background:var(--wh);transition:background .1s;cursor:default}
.cc:hover{background:#fefefe}
.cc.om{background:var(--bg)}
.cc.om .dn{color:var(--if)}
.cc.td{background:#e8f4ff}
.cc.td .dn{background:var(--brand);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px}
.dn{font-size:11px;font-weight:500;color:var(--im);margin-bottom:2px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.da{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:3px;border:1px solid var(--ru);background:var(--wh);color:var(--if);font-size:13px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer}
.cc:hover .da{display:flex}
.da:hover{background:var(--brand);border-color:var(--brand);color:#fff}
.ce{display:flex;flex-direction:column;gap:1px}
.chip{font-size:9px;padding:2px 4px;border-radius:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.chip:hover{opacity:.8}
.chip-call{background:#085041;color:#fff;border-left:none}
.chip-ooo{background:#633806;color:#fff;border-left:none}
.chip-travel{background:#0C447C;color:#fff;border-left:none}
.chip-climate{background:var(--gp);color:#0F6E56;border-left:2px solid var(--gm)}
.chip-global{background:#e8f4ff;color:#0f8afb;border-left:2px solid #0f8afb}
.chip-inclusion{background:var(--pp);color:var(--pu);border-left:2px solid var(--pu)}
.chip-energy{background:var(--ap);color:var(--am);border-left:2px solid var(--am)}
.chip-ownership{background:var(--cp);color:var(--co);border-left:2px solid var(--co)}
.chip-philanthropy{background:var(--kp);color:var(--pk);border-left:2px solid var(--pk)}
.chip-general{background:var(--gy);color:var(--im);border-left:2px solid #ccc}
.mc{font-size:9px;color:var(--if);padding:1px 4px;cursor:pointer}
.mc:hover{color:var(--im)}
/* List */
.list-area{flex:1;overflow-y:auto;padding:1.1rem 1.4rem;display:none}
.lmh{font-family:'Lora',serif;font-size:16px;font-style:italic;color:var(--ink);margin-bottom:.45rem;display:flex;align-items:baseline;gap:7px}
.lmc{font-family:'Noto Sans',sans-serif;font-size:11px;color:var(--if);font-style:normal}
.ll{display:flex;flex-direction:column;gap:3px;margin-bottom:1.4rem}
.lr{display:flex;gap:10px;padding:8px 12px;background:var(--wh);border:1px solid var(--ru);border-radius:var(--r);align-items:flex-start;position:relative;transition:border-color .1s,background .1s}
.lr:hover{border-color:#ccc;background:var(--bg)}
.lr.past{opacity:.5}
.lr.tc{border-left:4px solid #085041;border-radius:0 var(--r) var(--r) 0;background:#f8fdfb}
.lr.to{border-left:4px solid #633806;border-radius:0 var(--r) var(--r) 0;background:#fffaf5}
.lr.tt{border-left:4px solid #0C447C;border-radius:0 var(--r) var(--r) 0;background:#e8f2ff}
.ldate{min-width:36px;text-align:center;flex-shrink:0}
.lmon{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--if)}
.lday{font-size:18px;font-weight:300;line-height:1}
.lbody{flex:1;min-width:0}
.ltitle{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.ltitle a{color:inherit;text-decoration:none}
.ltitle a:hover{color:var(--gm)}
.lmeta{font-size:10px;color:var(--il);display:flex;gap:8px;flex-wrap:wrap}
.lnote{font-size:10px;color:#999;font-style:italic;margin-top:1px}
.lact{display:none;gap:3px;flex-shrink:0}
.lr:hover .lact{display:flex}
.ab{padding:3px 8px;font-size:10px;border:1px solid var(--ru);border-radius:4px;background:var(--wh);cursor:pointer;font-family:inherit;color:var(--im)}
.ab:hover{background:var(--bg)}
.ab.del:hover{background:#fff0f0;border-color:#fca5a5;color:#b91c1c}
.divl{display:flex;align-items:center;gap:8px;margin:1.1rem 0 .75rem}
.divln{flex:1;height:1px;background:var(--ru)}
.divlt{font-size:10px;color:var(--if);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
/* Pills - TYPE (solid rectangle, uppercase) */
.pl{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap;flex-shrink:0;letter-spacing:.03em;text-transform:uppercase}
.pl-call{background:#085041;color:#fff}
.pl-ooo{background:#633806;color:#fff}
.pl-travel{background:#0C447C;color:#fff}
/* Pills - TOPIC (rounded, softer) */
.pl-topic{border-radius:20px;font-weight:500;text-transform:none;letter-spacing:0;font-size:9px;padding:2px 7px}
.pl-climate{background:var(--gp);color:#0F6E56}
.pl-inclusion{background:var(--pp);color:var(--pu)}
.pl-global{background:#e8f4ff;color:#0f8afb}
.pl-general{background:var(--gy);color:var(--gr)}
.pl-energy{background:var(--ap);color:var(--am)}
.pl-ownership{background:var(--cp);color:var(--co)}
.pl-philanthropy{background:var(--kp);color:var(--pk)}
/* Pills - PARTNER (gold star) */
.pl-partner{background:#fef3c7;color:#78350f;border:1px solid #f59e0b;border-radius:4px;padding:2px 6px;font-weight:600;font-size:9px;text-transform:none;letter-spacing:0}
/* Pills - DISCOUNT */
.pl-disc{background:#eaf3de;color:#3B6D11;border-radius:20px;text-transform:none;letter-spacing:0;font-weight:500}
/* Team avatar pills */
.pl-team{width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;padding:0;text-transform:uppercase;letter-spacing:0}
/* Popover */
.pop-ov{display:none;position:fixed;inset:0;z-index:150}
.pop-ov.open{display:block}
.pop{position:fixed;background:var(--wh);border:1px solid var(--ru);border-radius:var(--rl);box-shadow:0 8px 28px rgba(0,0,0,.13);width:300px;max-height:400px;overflow-y:auto;z-index:160;padding:.875rem}
.pop-dt{font-family:'Lora',serif;font-size:14px;font-style:italic;margin-bottom:.65rem;color:var(--ink);display:flex;align-items:center;justify-content:space-between}
.pop-cl{font-size:17px;color:var(--if);cursor:pointer;background:none;border:none;font-family:inherit}
.pop-cl:hover{color:var(--ink)}
.pop-ev{padding:7px 9px;border-radius:5px;margin-bottom:4px;cursor:pointer}
.pop-ev:hover{opacity:.85}
.pop-t{font-size:11px;font-weight:500;margin-bottom:1px}
.pop-m{font-size:10px;opacity:.75}
.pop-add{width:100%;padding:6px;border:1px dashed var(--ru);border-radius:5px;background:transparent;color:var(--if);font-family:inherit;font-size:11px;cursor:pointer;margin-top:5px}
.pop-add:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-pale)}
/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(10,20,15,.5);z-index:200;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--wh);border-radius:var(--rl);width:510px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 56px rgba(0,0,0,.18)}
.mh{padding:1rem 1.4rem .8rem;border-bottom:1px solid var(--ru);display:flex;align-items:center;justify-content:space-between}
.mht{font-size:13px;font-weight:500}
.mc2{width:24px;height:24px;border-radius:5px;border:1px solid var(--ru);background:var(--bg);cursor:pointer;font-size:16px;color:var(--il);display:flex;align-items:center;justify-content:center}
.mc2:hover{background:var(--ru)}
.mb{padding:1rem 1.4rem}
.fr{margin-bottom:11px}
.fr label{display:block;font-size:10px;font-weight:700;color:#777;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.fr input,.fr select,.fr textarea{width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--ru);border-radius:var(--r);background:var(--bg);color:var(--ink);font-family:inherit;outline:none;transition:border-color .12s}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--brand)}
.fr textarea{min-height:52px;resize:vertical}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tcs{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.tc{padding:3px 8px;border-radius:20px;border:1px solid var(--ru);background:var(--wh);cursor:pointer;font-size:11px;transition:all .12s;user-select:none}
.mf{padding:.75rem 1.4rem;border-top:1px solid var(--ru);display:flex;justify-content:space-between;align-items:center}
.mfl{display:flex;gap:7px}
/* Loading */
.ls{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--il);gap:11px}
.sp{width:24px;height:24px;border:2px solid var(--ru);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Multi-day spanning bars */
.week-row{display:grid;grid-template-columns:repeat(7,1fr);position:relative;min-height:22px;margin-top:2px}
.span-bar{height:16px;border-radius:2px;font-size:9px;padding:1px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:14px;position:relative;z-index:1}
.span-bar:hover{opacity:.8;z-index:2}
.span-bar.start{border-radius:3px 0 0 3px}
.span-bar.end{border-radius:0 3px 3px 0}
.span-bar.solo{border-radius:3px}
.span-bar.mid{border-radius:0}
/* Partner event styling */
.chip-partner{background:#fef3c7;color:#78350f;border-left:2px solid #f59e0b;font-weight:600}
.chip-partner::before{content:'★ ';font-size:8px}
.span-bar.partner{background:#fef3c7;color:#78350f;border:1px solid #f59e0b;border-top:2px solid #f59e0b;font-weight:600}
.span-bar.partner::before{content:'★ ';font-size:8px}
.span-bar.chip-call{background:#085041;color:#fff;font-weight:600}
.span-bar.chip-ooo{background:#633806;color:#fff;font-weight:600}
.span-bar.chip-travel{background:#0C447C;color:#fff;font-weight:600}
.pl-partner{background:#fef3c7;color:#78350f;border:1px solid #f59e0b}
/* Cal cell: no bottom padding for event area, events handled in week rows */
.cal-day-num-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px}

/* Settings panel */
.settings-mo{display:none;position:fixed;inset:0;background:rgba(10,20,15,.5);z-index:300;align-items:center;justify-content:center}
.settings-mo.open{display:flex}
.settings-md{background:var(--wh);border-radius:var(--rl);width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 56px rgba(0,0,0,.18);display:flex;flex-direction:column}
.settings-hdr{padding:1rem 1.4rem .75rem;border-bottom:1px solid var(--ru);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.settings-hdr h3{font-size:14px;font-weight:500;color:var(--ink)}
.settings-tabs{display:flex;gap:0;border-bottom:1px solid var(--ru);flex-shrink:0}
.stab{padding:.6rem 1.25rem;font-size:12px;border:none;background:transparent;cursor:pointer;font-family:inherit;color:var(--im);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.stab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:500}
.settings-body{padding:1.25rem 1.4rem;flex:1;overflow-y:auto}
.settings-section{margin-bottom:1.5rem}
.settings-section h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--il);margin-bottom:.75rem}
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:.75rem}
.item-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:var(--r);border:1px solid var(--ru)}
.item-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.item-color{width:20px;height:20px;border-radius:4px;flex-shrink:0;cursor:pointer;border:1px solid rgba(0,0,0,.1)}
.item-name{flex:1;font-size:12px;font-weight:500;color:var(--ink)}
.item-detail{font-size:11px;color:var(--il)}
.item-del{background:transparent;border:none;color:var(--if);cursor:pointer;font-size:16px;padding:0 2px;line-height:1;transition:color .12s}
.item-del:hover{color:#b91c1c}
.add-row{display:flex;gap:8px;align-items:center}

<script>
const TODAY=new Date('2026-05-11');
const MNS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TM=['Jessica Pothering','Amy Cortese','David Bank','Cesar Chavez','Zuleyma Bebell','Dennis Price','Erik Stein','Roody Senatus','Lucy Ngige','Danielle Rossingh','Brian Walsh','Joe Whitwell'];
const TC={'Jessica Pothering':'#7e9cc8','Amy Cortese':'#7ec8b4','David Bank':'#9c7ec8','Cesar Chavez':'#c87e7e','Zuleyma Bebell':'#8ecac8','Dennis Price':'#c8a87e','Erik Stein':'#c87eac','Roody Senatus':'#a8c87e','Lucy Ngige':'#c8c07e','Danielle Rossingh':'#c8a0b4','Brian Walsh':'#90a8c8','Joe Whitwell':'#b4a87e'};
const TF=['climate','global','inclusion','energy','ownership','philanthropy','general'];
const TL={climate:'Climate',global:'Global',inclusion:'Inclusion',energy:'Energy',ownership:'Ownership',philanthropy:'Philanthropy',general:'General',call:'Call',ooo:'Out of office',travel:'Travel'};

// ── DYNAMIC CONFIG (editable via Settings panel) ──────────────────────────
const DEFAULT_COLORS=['#7e9cc8','#9c7ec8','#c87e7e','#7ec8b4','#c8a87e','#8ecac8','#c87eac','#a8c87e','#c8c07e','#c8a0b4','#90a8c8','#b4a87e','#a0b4c8','#c8b4a0','#b4c8a0'];
const TOPIC_PALETTE={climate:{bg:'var(--gp)',color:'#0F6E56',border:'var(--gm)'},global:{bg:'var(--bp)',color:'var(--bl)',border:'var(--bl)'},inclusion:{bg:'var(--pp)',color:'var(--pu)',border:'var(--pu)'},energy:{bg:'var(--ap)',color:'var(--am)',border:'var(--am)'},ownership:{bg:'var(--cp)',color:'var(--co)',border:'var(--co)'},philanthropy:{bg:'var(--kp)',color:'var(--pk)',border:'var(--pk)'},general:{bg:'var(--gy)',color:'var(--gr)',border:'#ccc'}};
const EXTRA_TOPIC_COLORS=[{bg:'#e8f4e8',color:'#2d6e2d',border:'#4a9e4a'},{bg:'#f0e8f4',color:'#6e2d8a',border:'#9e4ab4'},{bg:'#f4ece8',color:'#8a4a2d',border:'#c87050'},{bg:'#e8eef4',color:'#2d4a8a',border:'#4a6ab4'},{bg:'#f4f0e8',color:'#8a7a2d',border:'#b4a040'},{bg:'#f4e8ec',color:'#8a2d4a',border:'#c84070'}];

let dynamicTeam=[...TM.map((n,i)=>({name:n,color:TC[n]||DEFAULT_COLORS[i%DEFAULT_COLORS.length]}))];
let dynamicTopics=[...TF.map(k=>({key:k,label:TL[k]||k,...(TOPIC_PALETTE[k]||EXTRA_TOPIC_COLORS[0])}))];

function getTeamNames(){return dynamicTeam.map(t=>t.name);}
function getTeamColor(name){const t=dynamicTeam.find(t=>t.name===name);return t?t.color:(TC[name]||'#888');}
function getTopicKeys(){return dynamicTopics.map(t=>t.key);}
function getTopicLabel(key){const t=dynamicTopics.find(t=>t.key===key);return t?t.label:key;}
function getTopicStyle(key){const t=dynamicTopics.find(t=>t.key===key);return t||TOPIC_PALETTE.general;}
function getInitials(name){const parts=name.trim().split(' ');return parts.length>=2?(parts[0][0]+parts[parts.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();}
const DB_OK=SUPABASE_URL!=="PASTE_YOUR_SUPABASE_URL_HERE";
let events=[],filtered=[],activeFilters=new Set(['all']),curV='cal',calY=2026,calM=4;

function isPast(e){return new Date(e.dateStart.replace(/-/g,'/')) < TODAY;}
function uid(){return 'u'+Date.now()+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setSt(m,isErr=false){
  const el=document.getElementById('sst');
  el.textContent=m;
  el.style.color=isErr?'#f87171':'rgba(255,255,255,.4)';
}

async function dbF(path,opts={}){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opts,headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'',...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}
function toRow(e){return{id:e.id,title:e.title,date_start:e.dateStart,date_end:e.dateEnd||e.dateStart,type:e.type,tag:e.tag||'general',location:e.location||'',url:e.url||'',discount:e.discount||'',note:e.note||'',team:e.team||[]};}
function frRow(r){return{id:r.id,title:r.title,dateStart:r.date_start,dateEnd:r.date_end||r.date_start,type:r.type,tag:r.tag||'general',location:r.location||'',url:r.url||'',discount:r.discount||'',note:r.note||'',team:r.team||[],partner:r.partner===true};}
async function dbLoad(){return(await dbF('ia_calendar?order=date_start.asc')).map(frRow);}
async function dbIns(e){
  const row=toRow(e);
  console.log('Inserting row:', row);
  const res=await fetch(`${SUPABASE_URL}/rest/v1/ia_calendar`,{
    method:'POST',
    headers:{
      'apikey':SUPABASE_ANON_KEY,
      'Authorization':'Bearer '+SUPABASE_ANON_KEY,
      'Content-Type':'application/json',
      'Prefer':'return=representation'
    },
    body:JSON.stringify(row)
  });
  const text=await res.text();
  console.log('Insert response status:', res.status, text);
  if(!res.ok)throw new Error(`POST failed ${res.status}: ${text}`);
  return text?JSON.parse(text):null;
}
async function dbUpd(e){
  const row=toRow(e);
  console.log('Updating row:', e.id, row);
  const res=await fetch(`${SUPABASE_URL}/rest/v1/ia_calendar?id=eq.${e.id}`,{
    method:'PATCH',
    headers:{
      'apikey':SUPABASE_ANON_KEY,
      'Authorization':'Bearer '+SUPABASE_ANON_KEY,
      'Content-Type':'application/json',
      'Prefer':'return=representation'
    },
    body:JSON.stringify(row)
  });
  const text=await res.text();
  console.log('Update response status:', res.status, text);
  if(!res.ok)throw new Error(`PATCH failed ${res.status}: ${text}`);
  return text?JSON.parse(text):null;
}
async function dbDel(id){await dbF(`ia_calendar?id=eq.${id}`,{method:'DELETE'});}
async function dbSeed(arr){await dbF('ia_calendar',{method:'POST',prefer:'return=minimal',body:JSON.stringify(arr.map(toRow))});}

// ── SETTINGS ──────────────────────────────────────────────────────────────
const CFG_KEY = 'ia-cal-config';


// ── EVENT DETAIL PANEL ────────────────────────────────────────────────────
let detailEventId = null;

function openDetail(id){
  const e=events.find(x=>x.id===id);
  if(!e)return;
  detailEventId=id;

  // Title
  document.getElementById('detail-title').textContent=e.title;

  // Badges row
  const badges=document.getElementById('detail-badges');
  let badgeHtml='';
  if(e.type!=='event'){
    const typeColors={call:{bg:'#085041',color:'#fff'},ooo:{bg:'#633806',color:'#fff'},travel:{bg:'#0C447C',color:'#fff'}};
    const tc=typeColors[e.type]||{bg:'#333',color:'#fff'};
    const typeLabel={call:'📞 Call',ooo:'✈ Out of office',travel:'✈ Travel'}[e.type]||e.type;
    badgeHtml+=`<span class="detail-type-badge" style="background:${tc.bg};color:${tc.color}">${typeLabel}</span>`;
  }
  if(isPartner(e))badgeHtml+=`<span class="detail-partner-badge">★ Partner event</span>`;
  if(e.type==='event'){
    const s=getTopicStyle(e.tag||'general');
    const l=getTopicLabel(e.tag||'general');
    badgeHtml+=`<span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;background:${s.bg};color:${s.color};font-family:'Noto Sans',sans-serif">${l}</span>`;
  }
  badges.innerHTML=badgeHtml;

  // Body
  let body='';

  // Dates
  const dateStr=fmtR(e.dateStart,e.dateEnd);
  body+=`<div class="detail-row">
    <div class="detail-icon">🗓</div>
    <div><div class="detail-label">Date</div><div class="detail-value">${dateStr}</div></div>
  </div>`;

  // Location
  if(e.location){
    body+=`<div class="detail-row">
      <div class="detail-icon">📍</div>
      <div><div class="detail-label">Location</div><div class="detail-value">${esc(e.location)}</div></div>
    </div>`;
  }

  // URL
  if(e.url){
    body+=`<div class="detail-row">
      <div class="detail-icon">🔗</div>
      <div><div class="detail-label">Link</div>
        <a class="detail-link" href="${esc(e.url)}" target="_blank" rel="noreferrer">${esc(e.url.replace(/^https?:\/\//,'').replace(/\/$/,''))}</a>
      </div>
    </div>`;
  }

  // Discount
  if(e.discount){
    body+=`<div class="detail-row">
      <div class="detail-icon">%</div>
      <div><div class="detail-label">Discount</div>

async function loadConfig(){
  // Team is always sourced from the hardcoded TM/TC constants — never from DB.
  // This ensures full names and correct colors survive across updates.
  dynamicTeam=TM.map(n=>({name:n,color:TC[n]||'#888'}));
  // Only topics can be customised and saved to DB/localStorage
  if(DB_OK){
    try{
      const rows=await dbF('ia_config?key=eq.topics');
      if(rows&&rows.length){
        const r=rows[0];
        if(r&&r.value)dynamicTopics=JSON.parse(r.value);
        return;
      }
    }catch(e){console.warn('Config load failed, using defaults');}
  }
  const saved=localStorage.getItem(CFG_KEY);
  if(saved){
    try{
      const c=JSON.parse(saved);
      if(c.topics)dynamicTopics=c.topics;
    }catch(e){}
  }
}

async function persistConfig(){
  // Only persist topics — team is always sourced from hardcoded TM/TC
  if(DB_OK){
    try{
      await dbF('ia_config?key=eq.topics',{method:'DELETE'});
      await dbF('ia_config',{method:'POST',prefer:'return=minimal',body:JSON.stringify([
        {key:'topics',value:JSON.stringify(dynamicTopics)}
      ])});
    }catch(e){console.warn('Config save failed');}
  }
  localStorage.setItem(CFG_KEY,JSON.stringify({topics:dynamicTopics}));
}

function setFilter(el,f){
  if(f==='all'){
    // All clears everything else
    activeFilters=new Set(['all']);
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
  } else {
    // Remove 'all' when selecting anything specific
    activeFilters.delete('all');
    document.querySelector('[data-f="all"]')?.classList.remove('active');
    if(activeFilters.has(f)){
      activeFilters.delete(f);
      el.classList.remove('active');
      if(activeFilters.size===0){
        activeFilters.add('all');
        document.querySelector('[data-f="all"]')?.classList.add('active');
      }
    } else {
      activeFilters.add(f);
      el.classList.add('active');
    }
  }
  applyFilters();
}
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const fs=activeFilters;

  // Categorise active filters
  const typeFilters=['call','travel','ooo','event'].filter(f=>fs.has(f));
  const topicFilters=getTopicKeys().filter(f=>fs.has(f));
  const teamFilters=getTeamNames().filter(f=>fs.has(f));
  const specialFilters=['upcoming','partner','nonpartner','discount'].filter(f=>fs.has(f));
  const isAll=fs.has('all');

  filtered=events.filter(e=>{
    const ms=!q||(e.title+(e.location||'')+(e.tag||'')+(e.note||'')+(e.team||[]).join(' ')).toLowerCase().includes(q);
    if(!ms)return false;
    if(isAll)return true;

    // Each active category must match (AND between categories, OR within)
    if(typeFilters.length&&!typeFilters.some(f=>e.type===f))return false;
    if(topicFilters.length&&!topicFilters.some(f=>e.tag===f))return false;
    if(teamFilters.length&&!teamFilters.some(f=>(e.team||[]).includes(f)))return false;
    if(specialFilters.length){
      const ok=specialFilters.every(f=>{
        if(f==='upcoming')return !isPast(e);
        if(f==='partner')return isPartner(e);
        if(f==='nonpartner')return !isPartner(e);
        if(f==='discount')return !!e.discount;
        return true;
      });
      if(!ok)return false;
    }
    return true;
  });
  // If filtering by team member or topic, jump calendar to first matching event
  const isPersonFilter=!activeFilters.has('all')&&activeFilters.size>0;
  if(isPersonFilter&&filtered.length>0&&curV==='cal'){
    const upcoming=filtered.filter(e=>!isPast(e)).sort((a,b)=>a.dateStart.localeCompare(b.dateStart));
    const target=upcoming.length?upcoming[0]:filtered.sort((a,b)=>b.dateStart.localeCompare(a.dateStart))[0];
    if(target){
      const parts=target.dateStart.split('-');
      calY=+parts[0]; calM=+parts[1]-1;
    }
  }
  // Reset to current month when clearing filter
  if(activeFilters.has('all')&&q===''){calY=2026;calM=4;}
  render(); updCounts();
}
function updCounts(){
  const c=fn=>events.filter(fn).length;
  const s=id=>v=>document.getElementById(id)&&(document.getElementById(id).textContent=v);
  s('cnt-all')(events.length); s('cnt-up')(c(e=>!isPast(e)));
  s('cnt-call')(c(e=>e.type==='call')); s('cnt-travel')(c(e=>e.type==='travel'));
  s('cnt-ooo')(c(e=>e.type==='ooo')); s('cnt-event')(c(e=>e.type==='event'));
  dynamicTeam.forEach(t=>{const el=document.getElementById('cnt-'+t.name);if(el)el.textContent=c(e=>(e.team||[]).includes(t.name));});
  s('s-total')(events.length); s('s-up')(c(e=>!isPast(e)));
  s('s-calls')(c(e=>e.type==='call')); s('s-disc')(c(e=>!!e.discount));
}

function renderCal(){
  document.getElementById('mnt').textContent=MNS[calM];
  document.getElementById('mns').textContent=calY;
  const first=new Date(calY,calM,1);
  const sdow=first.getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const dip=new Date(calY,calM,0).getDate();
  const todS=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;

  // Build array of all days in the grid
  const gridDays=[];
  for(let i=sdow-1;i>=0;i--)gridDays.push({d:dip-i,thisMonth:false,ds:null});
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    gridDays.push({d,thisMonth:true,ds});
  }
  const rem=(7-(gridDays.length)%7)%7;
  for(let d=1;d<=rem;d++)gridDays.push({d,thisMonth:false,ds:null});

  // Split into weeks
  const weeks=[];
  for(let i=0;i<gridDays.length;i+=7)weeks.push(gridDays.slice(i,i+7));

  // For each filtered event, compute which cells it occupies
  function eStart(e){return e.dateStart;}
  function eEnd(e){return e.dateEnd||e.dateStart;}

  // Build week-level layout
  let html='<div style="display:flex;flex-direction:column;border-left:1px solid var(--ru)">';

  weeks.forEach(week=>{
    // Day number + add button row
    let dayRow='<div style="display:grid;grid-template-columns:repeat(7,1fr)">';
    week.forEach(day=>{
      const isT=day.ds===todS;
      const om=!day.thisMonth;
      dayRow+=`<div class="cc${isT?' td':''}${om?' om':''}" style="min-height:90px;display:flex;flex-direction:column">
        <div class="cal-day-num-row">
          <div class="dn">${day.d}</div>
          ${day.thisMonth?`<button class="da" onclick="openModal(null,'${day.ds}')">+</button>`:''}
        </div>
      </div>`;
    });
    dayRow+='</div>';

    // Event bars for this week
    // Collect events that overlap this week
    const weekStart=week[0].ds||week.find(d=>d.ds)?.ds;
    const weekEnd=week[6].ds||week.slice().reverse().find(d=>d.ds)?.ds;
    if(!weekStart||!weekEnd){html+=dayRow;return;}

    const weekEvts=filtered.filter(e=>{
      const s=eStart(e),en=eEnd(e);
      return s<=weekEnd&&en>=weekStart;
    }).sort((a,b)=>{
      // sort: multi-day first, then by start
      const aLen=(new Date(eEnd(a))-new Date(eStart(a)));
      const bLen=(new Date(eEnd(b))-new Date(eStart(b)));
      if(bLen!==aLen)return bLen-aLen;
      return eStart(a).localeCompare(eStart(b));
    });

    // Assign rows to avoid overlap
    const lanes=[];
    const laneAssign=weekEvts.map(e=>{
      const eS=eStart(e),eE=eEnd(e);
      // Find cells in this week
      const startCol=week.findIndex(d=>d.ds&&d.ds>=eS&&d.ds<=eE);
      const endCol=7-1-[...week].reverse().findIndex(d=>d.ds&&d.ds>=eS&&d.ds<=eE);
      if(startCol===-1)return{e,startCol:-1,endCol:-1,lane:-1};
      // Assign lane
      let lane=0;
      while(lanes[lane]&&lanes[lane]>startCol)lane++;
      lanes[lane]=endCol+1;
      return{e,startCol,endCol,lane};
    }).filter(x=>x.startCol!==-1);

    const maxLane=laneAssign.reduce((m,x)=>Math.max(m,x.lane),0);

    // Render: day cells with absolute positioned bars
    let weekHtml='<div style="position:relative">';
    // Day cells (just the number rows)
    weekHtml+='<div style="display:grid;grid-template-columns:repeat(7,1fr)">';
    week.forEach(day=>{
      const isT=day.ds===todS;
      const om=!day.thisMonth;
      const paddingTop=(maxLane+1)*19+4;
      weekHtml+=`<div class="cc${isT?' td':''}${om?' om':''}" style="min-height:${90+paddingTop}px;padding-top:${paddingTop}px;cursor:${day.thisMonth?'pointer':'default'}" onclick="${day.thisMonth?`openPop(event,'${day.ds}')`:''}">
        <div class="cal-day-num-row">
          <div class="dn" onclick="${day.thisMonth?`event.stopPropagation();openPop(event,'${day.ds}')`:''}" style="cursor:${day.thisMonth?'pointer':'default'}">${day.d}</div>
          ${day.thisMonth?`<button class="da" onclick="event.stopPropagation();openModal(null,'${day.ds}')">+</button>`:''}
        </div>
      </div>`;
    });
    weekHtml+='</div>';

    // Overlay bars
    laneAssign.forEach(({e,startCol,endCol,lane})=>{
      const isMD=eStart(e)!==eEnd(e);
      const isStart=eStart(e)>=week[startCol].ds;
      const isEnd=eEnd(e)<=(week[endCol].ds||weekEnd);
      const partner=isPartner(e);
      const cc=partner?'partner':chipCls(e).replace('chip-','');

      let barClass='span-bar';
      if(isMD){
        if(isStart&&isEnd)barClass+=' solo';
        else if(isStart)barClass+=' start';
        else if(isEnd)barClass+=' end';
        else barClass+=' mid';
      }else{barClass+=' solo';}

      if(partner)barClass+=' partner';
      else barClass+=` chip-${chipCls(e).replace('chip-','')}`;

      const colW=100/7;
      const left=startCol*colW;
      const width=(endCol-startCol+1)*colW;
      const top=4+lane*19;
      const teamBadges=(e.team||[]).slice(0,3).map(m=>`<span style="display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:${getTeamColor(m)};color:#fff;font-size:7px;font-weight:700;flex-shrink:0;margin-left:2px" title="${m}">${getInitials(m)}</span>`).join('');
      const showLabel=isStart||!isMD;
      const labelText=showLabel?esc(e.title):'↳';

      weekHtml+=`<div class="${barClass}" 
        style="position:absolute;left:${left.toFixed(2)}%;width:calc(${width.toFixed(2)}% - 1px);top:${top}px;display:flex;align-items:center;gap:2px;overflow:hidden;cursor:pointer"
        onclick="event.stopPropagation();openDetail('${e.id}')" 
        title="${e.title}${e.location?' · '+e.location:''}${(e.team||[]).length?' — '+(e.team||[]).join(', '):''}"
      ><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${labelText}</span>${showLabel?teamBadges:''}</div>`;
    });

    weekHtml+='</div>';
    html+=weekHtml;
  });

  html+='</div>';
  document.getElementById('cal-grid').innerHTML=html;
}

function openPop(evt,ds){
  evt.stopPropagation();
  const evts=filtered.filter(e=>{const en=e.dateEnd||e.dateStart;return ds>=e.dateStart&&ds<=en;});
  const [y,m,d]=ds.split('-');
  const lbl=`${MNS[+m-1]} ${+d}, ${y}`;
  const bgMap={call:'#d1f0e4',ooo:'#fde8c0',travel:'#cfe0f5'};
  const colMap={call:'#085041',ooo:'#633806',travel:'#0C447C'};
  const evtH=evts.map(e=>{
    const bg=bgMap[e.type]||'#f1efe8';const col=colMap[e.type]||'#444';
    return `<div class="pop-ev" style="background:${bg};color:${col}" onclick="editFP('${e.id}')">
      <div class="pop-t">${esc(e.title)}</div>
      <div class="pop-m">${e.location?'📍'+e.location+' · ':''}${fmtR(e.dateStart,e.dateEnd)}</div>
    </div>`;
  }).join('');

function fmtR(s,e2){
  if(!s)return'';const a=s.split('-'),b=(e2||s).split('-');
  if(s===(e2||s))return MS[+a[1]-1]+' '+(+a[2]);
  if(a[1]===b[1])return MS[+a[1]-1]+' '+(+a[2])+'&ndash;'+(+b[2]);
  return MS[+a[1]-1]+' '+(+a[2])+' &ndash; '+MS[+b[1]-1]+' '+(+b[2]);
}
function pillH(e){
  const parts=[];
  if(e.type==='event'&&isPartner(e))parts.push('<span class="pl pl-partner">★ Partner</span>');

  const k=e.type==='event'?(e.tag||'general'):e.type;
  const l=e.type==='event'?(TL[e.tag]||e.tag):TL[e.type];
  if(l)parts.push(`<span class="pl pl-${k}">${l}</span>`);
  return parts.join('');
}
function tpH(e){
  return(e.team||[]).map(m=>{
    const c=getTeamColor(m);
    const ini=getInitials(m);
    return`<span class="pl-team" style="background:${c}" title="${m}">${ini}</span>`;
  }).join('');
}
function lrH(e){
  const s=e.dateStart.split('-');
  const tI=e.url?`<a href="${esc(e.url)}" target="_blank" rel="noreferrer">${esc(e.title)}</a>`:esc(e.title);
  const disc=e.discount?`<span class="pl pl-disc">${esc(e.discount)}</span>`:'';
  const note=e.note?`<div class="lnote">${esc(e.note)}</div>`:'';
  const tc=e.type==='call'?'tc':e.type==='ooo'?'to':e.type==='travel'?'tt':'';
  return`<div class="lr${isPast(e)?' past':''} ${tc}" onclick="openDetail('${e.id}')" style="cursor:pointer">
    <div class="ldate"><div class="lmon">${MS[+s[1]-1]}</div><div class="lday">${+s[2]}</div></div>
    <div class="lbody">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap">
        <span class="ltitle">${tI}</span>${pillH(e)}${disc}${tpH(e)}
      </div>
      <div class="lmeta">${e.location?'📍 '+e.location:''}${e.location&&e.dateStart?' · ':''}<span>${fmtR(e.dateStart,e.dateEnd)}</span></div>
      ${note}
    </div>
    <div class="lact">
      <button class="ab" onclick="openDetail('${e.id}')">View</button>
      <button class="ab del" onclick="delItem('${e.id}')">Delete</button>
    </div>
  </div>`;
}
function renderList(){
  const area=document.getElementById('list-area');
  const up=filtered.filter(e=>!isPast(e)).sort((a,b)=>a.dateStart.localeCompare(b.dateStart));
  const past=filtered.filter(isPast).sort((a,b)=>b.dateStart.localeCompare(a.dateStart));
  function bm(items,asc){
    const m={};items.forEach(e=>{const k=+e.dateStart.split('-')[1]-1;if(!m[k])m[k]=[];m[k].push(e);});
    return Object.keys(m).sort((a,b)=>asc?+a-+b:+b-+a).map(k=>`<div><div class="lmh">${MNS[k]}<span class="lmc">${m[k].length}</span></div><div class="ll">${m[k].map(lrH).join('')}</div></div>`).join('');
  }
  let h='';
  if(up.length)h+=`<div style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--if);margin-bottom:.65rem">Upcoming &mdash; ${up.length}</div>${bm(up,true)}`;
  if(past.length)h+=`<div class="divl"><div class="divln"></div><div class="divlt">Earlier this year &mdash; ${past.length}</div><div class="divln"></div></div>${bm(past,false)}`;
  if(!filtered.length)h=`<div style="text-align:center;padding:3rem;color:var(--if)">No items match your filter.</div>`;
  area.innerHTML=h;
}

async function saveItem(){
  const title=document.getElementById('ft').value.trim();
  const start=document.getElementById('fs').value;
  if(!title||!start){alert('Title and start date are required.');return;}
  const id=document.getElementById('eid').value;
  const item={id:id||uid(),title,dateStart:start,dateEnd:document.getElementById('fe').value||start,type:document.getElementById('ftype').value,tag:document.getElementById('ftag').value,location:document.getElementById('floc').value.trim(),url:document.getElementById('furl').value.trim(),discount:document.getElementById('fdisc').value.trim(),note:document.getElementById('fnote').value.trim(),team:[...chkTm],partner:document.getElementById('fpartner').checked};
  closeMo();setSt('Saving\u2026');
  if(id){events=events.map(e=>e.id===id?item:e);if(DB_OK)await dbUpd(item).catch(e=>{console.error('Update failed:',e);setSt('\u26a0 Save failed — see console',true);});}
  else{events=[...events,item];if(DB_OK)await dbIns(item).catch(e=>{console.error('Insert failed:',e);setSt('\u26a0 Save failed — see console',true);});}
  if(!DB_OK)localStorage.setItem('ia-cal',JSON.stringify(events));
  setSt('Saved '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),false);
  applyFilters();
}
async function delItem(id){
  if(!confirm('Delete this item?'))return;
  events=events.filter(e=>e.id!==id);
  if(DB_OK)await dbDel(id).catch(()=>{});
  else localStorage.setItem('ia-cal',JSON.stringify(events));
  applyFilters();
}

}
